<section aria-label="Filtros e ações" class="tbx-toolbar">
  <div class="tbx-row">
    <!-- COL ESQUERDA (50%) -->
    <div class="tbx-col tbx-col-left">
      <!-- RFC-0107: Contract Status Icon (no native title - uses ContractSummaryTooltip) -->
      <div id="tbx-contract-status" class="tbx-contract-status" style="display: flex">
        <span class="tbx-contract-icon">📋</span>
        <span class="tbx-contract-count">--</span>
      </div>

      <!-- compat (ocultos) -->
      <label class="tbx-field" style="display: none"><input id="tbx-date-start" type="date" /></label>
      <span class="tbx-ate" style="display: none">até</span>
      <label class="tbx-field" style="display: none"><input id="tbx-date-end" type="date" /></label>

      <!-- range -->
      <label aria-label="Período" class="tbx-field">
        <span class="tbx-ico tbx-ico-cal">📅</span>
        <input
          type="text"
          name="startDatetimes"
          placeholder="Digite a data ou período"
          readonly
          title="Clique aqui para alterar o intervalo de datas"
        />
      </label>

      <!-- granularity toggle -->
      <div class="tbx-granularity-toggle" id="tbx-granularity-toggle" role="group" aria-label="Granularidade do relatório">
        <button class="tbx-gran-btn tbx-gran-active" data-gran="1d" title="Granularidade diária">1d</button>
        <button class="tbx-gran-btn" data-gran="1h" title="Granularidade horária">1h</button>
      </div>

      <!-- carregar -->
      <button class="tbx-btn tbx-btn-primary" id="tbx-btn-load" title="Carregar">
        <span class="tbx-ico rotate">⟲</span>
        <span>Carregar</span>
      </button>

      <!-- force refresh -->
      <button
        class="tbx-btn tbx-btn-secondary"
        id="tbx-btn-force-refresh"
        title="Limpar cache e recarregar (use se os dados ficarem travados)"
      >
        <span class="tbx-ico">🔄</span>
        <span>Limpar</span>
      </button>

      <button
        class="tbx-btn tbx-btn-primary"
        id="tbx-btn-report-general"
        title="Relatório Consumo Geral"
        disabled
        style="display:none"
      >
        <span class="tbx-ico">🧾</span>
        <span id="tbx-btn-report-general-text">Relatório Consumo Geral</span>
      </button>

      <button
        class="tbx-btn tbx-btn-primary"
        id="tbx-btn-report-alarm"
        title="Relatório de Alarmes"
        disabled
        style="display:none"
      >
        <span class="tbx-ico">🔔</span>
        <span>Relatório de Alarmes</span>
      </button>
    </div>
  </div>
</section>
